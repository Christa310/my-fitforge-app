workflows:
  ios-debug:
    name: FitForge Debug Build
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        SCHEME: FitForge
        SIMULATOR: "iPhone 15 Pro"

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Verify project was created
        script: ls -la FitForge.xcodeproj

      - name: Build Debug (Simulator)
        script: |
          xcodebuild build \
            -project FitForge.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Tests
        script: |
          xcodebuild test \
            -project FitForge.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

    artifacts:
      - FitForge.xcodeproj

  ios-release:
    name: FitForge Release Build
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        SCHEME: FitForge

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Build Release
        script: |
          xcodebuild build \
            -project FitForge.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

    artifacts:
      - "**/*.app"
      - "**/*.ipa"
