name: FitForge
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    ENABLE_PREVIEWS: YES

targets:
  FitForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: FitForge
        includes:
          - "**/*.swift"
        excludes:
          - "**/*.md"

    resources:
      - path: FitForge/Resources
        optional: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.fitforge
        PRODUCT_NAME: FitForge
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: FitForge/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""

      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
          ENABLE_TESTABILITY: YES

        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          VALIDATE_PRODUCT: YES
          STRIP_INSTALLED_PRODUCT: YES

    scheme:
      testTargets:
        - FitForgeTests

  FitForgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: FitForgeTests
        optional: true

    dependencies:
      - target: FitForge

    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FitForge.app/FitForge"
