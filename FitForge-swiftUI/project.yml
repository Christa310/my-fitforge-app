name: FitForge
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

targets:
  FitForge:
    type: application
    platform: iOS
    sources:
      - path: FitForge
        excludes:
          - "**/{Models,Views,ViewModels,Resources}"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.fitforge
        INFOPLIST_FILE: FitForge/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: Charts.framework
